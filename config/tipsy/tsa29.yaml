      leading_species_in: ["P", "PA", "PJ", "PL", "PLC", "PLI", "PM"]
    assign:
      e:
        Proportion: 0.70
        Regen_Method: "N"
        Regen_Delay: 4
        Density: 1001
        SPP_1: "PL"
        PCT_1: 87
        SPP_2: "AT"
        PCT_2: 10
        SPP_3: "FD"
        PCT_3: 1
        SPP_4: "SX"
        PCT_4: 1
        Util_DBH_cm: 12.5
      f:
        Proportion: 0.30
        Regen_Method: "P"
        Regen_Delay: 4
        Density: 1001
