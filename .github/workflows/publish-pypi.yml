name: publish-pypi

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Set deterministic build epoch
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build release artifacts
        run: python -m build

      - name: Validate artifacts
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Smoke install from PyPI
        run: |
          python -m venv /tmp/femic-pypi-smoke
          /tmp/femic-pypi-smoke/bin/pip install --upgrade pip
          version="$(python -c "from pathlib import Path; import tomllib; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")"
          for attempt in {1..10}; do
            if /tmp/femic-pypi-smoke/bin/pip install "femic==${version}"; then
              break
            fi
            if [[ "$attempt" -eq 10 ]]; then
              echo "PyPI index did not surface femic==${version} after retries."
              exit 1
            fi
            sleep 15
          done
          /tmp/femic-pypi-smoke/bin/femic --help
